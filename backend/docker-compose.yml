services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: panpacific
      POSTGRES_PASSWORD: panpacific
      POSTGRES_DB: panpacific
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./migrations/001_init.up.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./migrations/002_seed.up.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panpacific -d panpacific"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
